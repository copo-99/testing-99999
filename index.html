<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hugging Face AI Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #121212; color: white; }
    input { width: 85%; padding: 12px; border-radius: 8px; border: 1px solid #444; margin-bottom: 12px; background: #222; color: white; }
    button { padding: 12px 24px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    #status { margin-top: 15px; color: #ffca28; }
    img { margin-top: 20px; max-width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

  <h2>Hugging Face Image Generator</h2>
  
  <input type="password" id="hfToken" placeholder="Paste your HF Token (hf_...)">
  <br>
  <input type="text" id="prompt" placeholder="Describe your image...">
  <br>
  <button id="genBtn" onclick="generateImage()">Generate</button>
  
  <p id="status"></p>
  <img id="result" style="display:none;">

  <script>
    // Load saved token from your browser on page open
    document.getElementById('hfToken').value = localStorage.getItem('user_hf_token') || '';

    async function generateImage() {
      const token = document.getElementById('hfToken').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      const status = document.getElementById('status');
      const imgElement = document.getElementById('result');
      const btn = document.getElementById('genBtn');

      if (!token) return alert('Please enter your Hugging Face Token!');
      if (!prompt) return alert('Please enter a prompt!');

      // Save token locally in your browser (not on GitHub)
      localStorage.setItem('user_hf_token', token);

      btn.disabled = true;
      status.innerText = "Connecting to Hugging Face... (may take 10-20 sec)";
      imgElement.style.display = 'none';

      try {
        const response = await fetch(
          "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
          {
            headers: { 
              "Authorization": `Bearer ${token}`,
              "Content-Type": "application/json"
            },
            method: "POST",
            body: JSON.stringify({ inputs: prompt }),
          }
        );

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Error ${response.status}: Failed to generate`);
        }

        const blob = await response.blob();
        imgElement.src = URL.createObjectURL(blob);
        imgElement.style.display = 'inline-block';
        status.innerText = "Done!";
      } catch (err) {
        status.innerText = "Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
