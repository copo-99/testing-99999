<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #121212; color: white; }
    input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 10px; background: #222; color: white; }
    button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    #status { margin-top: 15px; color: #ffca28; }
    img { margin-top: 20px; max-width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

  <h2>AI Image Generator</h2>
  <input type="password" id="token" placeholder="Paste your Hugging Face Token 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">
  <br>
  <input type="text" id="prompt" placeholder="Describe your image...">
  <br>
  <button id="genBtn" onclick="generateImage()">Generate</button>
  
  <p id="status"></p>
  <img id="result" style="display:none;">

  <script>
    // Automatically retrieve saved token from browser storage
    document.getElementById('token').value = localStorage.getItem('hf_token') || '';

    async function generateImage() {
      const token = document.getElementById('token').value.trim();
      const prompt = document.getElementById('prompt').value.trim();
      const status = document.getElementById('status');
      const imgElement = document.getElementById('result');
      const btn = document.getElementById('genBtn');

      if (!token) return alert('Please enter your Hugging Face token!');
      if (!prompt) return alert('Please enter a prompt!');

      // Save token locally in browser so you don't have to re-enter it
      localStorage.setItem('hf_token', token);

      btn.disabled = true;
      status.innerText = "Generating image... (this may take 10-20 seconds)";
      imgElement.style.display = 'none';

      try {
        const response = await fetch(
          "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
          {
            headers: { 
              "Authorization": `Bearer ${token}`,
              "Content-Type": "application/json" 
            },
            method: "POST",
            body: JSON.stringify({ inputs: prompt }),
          }
        );

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `HTTP Error ${response.status}`);
        }

        const blob = await response.blob();
        imgElement.src = URL.createObjectURL(blob);
        imgElement.style.display = 'block';
        status.innerText = "Success!";
      } catch (err) {
        status.innerText = "Error: " + err.message;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
