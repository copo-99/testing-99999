<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free AI Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #121212; color: white; }
    input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #333; margin-bottom: 12px; background: #222; color: white; }
    button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
    #status { margin-top: 15px; color: #ffca28; }
    img { margin-top: 20px; max-width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

  <h2>Free AI Image Generator</h2>
  <input type="text" id="prompt" placeholder="Describe your image...">
  <br>
  <button id="genBtn" onclick="generateImage()">Generate</button>
  
  <p id="status"></p>
  <img id="result" style="display:none;">

  <script>
    function generateImage() {
      const promptInput = document.getElementById('prompt').value.trim();
      const status = document.getElementById('status');
      const imgElement = document.getElementById('result');
      const btn = document.getElementById('genBtn');

      if (!promptInput) return alert('Please enter a prompt!');

      btn.disabled = true;
      status.innerText = "Generating image...";
      imgElement.style.display = 'none';

      // Encode prompt so spaces and special characters don't break the URL
      const encodedPrompt = encodeURIComponent(promptInput);
      
      // Random seed forces the API to generate a new variation every time
      const seed = Math.floor(Math.random() * 100000);
      
      // Construct direct URL (No API Key Required!)
      const imageUrl = `https://pollinations.ai/p/${encodedPrompt}?seed=${seed}&width=1024&height=1024&nologo=true`;

      // Preload the image before displaying
      const tempImg = new Image();
      tempImg.src = imageUrl;

      tempImg.onload = function() {
        imgElement.src = imageUrl;
        imgElement.style.display = 'inline-block';
        status.innerText = "Done!";
        btn.disabled = false;
      };

      tempImg.onerror = function() {
        status.innerText = "Error generating image. Try again.";
        btn.disabled = false;
      };
    }
  </script>
</body>
</html>
