<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My AI Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; text-align: center; background: #121212; color: white; }
    input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; }
    button { padding: 12px 20px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
    img { margin-top: 20px; max-width: 100%; border-radius: 8px; }
  </style>
</head>
<body>

  <h2>AI Image Generator</h2>
  <input type="text" id="prompt" placeholder="Describe your image...">
  <button onclick="generateImage()">Generate</button>
  <br>
  <img id="result" src="" style="display:none;">

  <script>
    async function generateImage() {
      const prompt = document.getElementById('prompt').value;
      const imgElement = document.getElementById('result');
      if (!prompt) return alert('Please enter a prompt!');

      imgElement.style.display = 'none';

      // We call the FLUX.1 or Stable Diffusion model on Hugging Face
      const response = await fetch(
        "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell",
        {
          headers: { Authorization: "Bearer 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" },
          method: "POST",
          body: JSON.stringify({ inputs: prompt }),
        }
      );

      const blob = await response.blob();
      imgElement.src = URL.createObjectURL(blob);
      imgElement.style.display = 'block';
    }
  </script>
</body>
